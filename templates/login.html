<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Вход в систему</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl">
        <h2 class="text-3xl font-bold mb-6 text-center text-blue-500">Авторизация</h2>

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-medium mb-2 text-slate-400">Логин</label>
                <input type="text" name="username" required
                       class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-600 outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium mb-2 text-slate-400">Пароль</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-600 outline-none transition">
            </div>

            <button type="submit"
                    class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-semibold rounded-lg shadow-lg transition-all duration-200">
                Войти
            </button>
        </form>

        <p class="mt-6 text-center text-xs text-slate-500 uppercase tracking-widest">
            Infrastructure Development Dept.
        </p>
    </div>
</body>
</html>
