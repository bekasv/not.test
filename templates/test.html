<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Система Тестирования</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        /* Добавил стили для иконок, которых не хватало */
        .option-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border-width: 2px;
            transition: all 0.2s;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

    <div class="max-w-4xl mx-auto">
        <div id="main-menu" class="space-y-6">
            <div class="bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h1 class="text-3xl font-black text-white mb-2">Личный кабинет</h1>
                    <p class="text-slate-400 italic">Пользователь: <span id="username-display">user</span></p>
                </div>
                <div class="flex gap-4">
                    <button onclick="startQuiz()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-2xl font-bold transition-all shadow-lg shadow-blue-900/20 active:scale-95">
                        Начать тестирование
                    </button>
                    <a href="/logout" class="bg-slate-800 hover:bg-slate-700 px-6 py-4 rounded-2xl text-sm flex items-center">Выход</a>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-3xl overflow-hidden shadow-xl">
                <div class="p-6 border-b border-slate-800 bg-slate-800/30">
                    <h2 class="text-xl font-bold">История ваших тестов</h2>
                </div>
                <div id="history-list" class="max-h-[400px] overflow-y-auto p-6 space-y-3 custom-scrollbar">
                    </div>
            </div>
        </div>

        <div id="quiz-ui" class="hidden space-y-6">
            <div class="flex flex-wrap justify-between items-center bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg gap-4">
                <div class="flex items-center gap-6">
                    <div id="timer" class="text-3xl font-mono font-bold text-orange-500 drop-shadow-[0_0_10px_rgba(249,115,22,0.3)]">120:00</div>
                    <button id="pause-btn" onclick="togglePause()" class="bg-slate-800 hover:bg-slate-700 px-5 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition">Пауза</button>
                </div>
                <div id="progress-text" class="text-slate-400 font-medium"></div>
                <button onclick="confirmEarlyExit()" class="text-red-500 hover:text-red-400 font-bold text-sm border-b border-red-900">Завершить досрочно</button>
            </div>

            <div id="quiz-container" class="bg-slate-900 p-8 md:p-12 rounded-3xl border border-slate-800 shadow-2xl relative">
                <div id="question-meta" class="text-xs text-blue-500 font-black uppercase mb-4 tracking-widest"></div>
                <h2 id="question-text" class="text-2xl md:text-3xl font-bold mb-8 leading-tight"></h2>

                <div id="options" class="space-y-4"></div>

                <div id="feedback" class="mt-8 p-6 rounded-2xl hidden"></div>

                <div class="flex justify-between items-center mt-12 pt-8 border-t border-slate-800/50">
                    <button id="prev-btn" onclick="prevQuestion()" class="px-8 py-3 bg-slate-800 rounded-xl hover:bg-slate-700 disabled:opacity-20 transition">Назад</button>
                    <div class="flex gap-4">
                        <button id="confirm-btn" onclick="confirmAnswer()" class="px-10 py-3 bg-blue-600 rounded-xl hover:bg-blue-500 font-bold transition shadow-lg shadow-blue-900/40">Подтвердить</button>
                        <button id="next-btn" onclick="nextQuestion()" class="px-10 py-3 bg-slate-700 rounded-xl hidden hover:bg-slate-600 font-bold transition">Далее</button>
                        <button id="finish-btn" onclick="finishQuiz()" class="px-10 py-3 bg-green-600 rounded-xl hidden hover:bg-green-500 font-bold transition shadow-lg shadow-green-900/40">Итоги</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="result-screen" class="hidden text-center space-y-8 py-20">
            <div class="inline-block p-6 bg-blue-600/10 rounded-full mb-4">
                <svg class="w-20 h-20 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h1 class="text-6xl font-black text-white">Результат</h1>
            <div class="text-8xl font-mono font-black text-blue-500" id="final-score-val">0 / 0</div>
            <div class="text-3xl text-slate-400" id="final-percent">0%</div>
            <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 px-12 py-4 rounded-2xl font-bold transition mt-10">Вернуться в меню</button>
        </div>
    </div>

    <div id="pause-overlay" class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl z-50 hidden flex flex-col items-center justify-center">
        <h2 class="text-5xl font-black mb-10 text-white">ТЕСТ ПРИОСТАНОВЛЕН</h2>
        <button onclick="togglePause()" class="bg-blue-600 hover:bg-blue-500 px-12 py-5 rounded-3xl font-black text-xl transition active:scale-90">ПРОДОЛЖИТЬ</button>
    </div>

    <script>
        let questions = [], currentIndex = 0, userAnswers = {}, score = 0;
        let confirmedQuestions = new Set(), isPaused = false, timeLeft = 120 * 60, timerInterval;

        // Элементы DOM
        const historyList = document.getElementById('history-list');
        const timerDisplay = document.getElementById('timer');

        async function loadHistory() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                if (!data || !data.length) {
                    historyList.innerHTML = '<div class="text-center py-10 text-slate-600">История пуста</div>';
                    return;
                }
                historyList.innerHTML = data.map(r => `
                    <div class="flex justify-between items-center bg-slate-800/40 p-5 rounded-2xl border border-slate-800">
                        <div>
                            <div class="text-xl font-bold text-blue-400">${r.percentage}%</div>
                            <div class="text-xs text-slate-500 uppercase font-bold tracking-tighter">${new Date(r.date).toLocaleString()}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-sm font-bold">${r.score} из ${r.total}</div>
                            <div class="text-[10px] text-slate-500">БАЛЛЫ</div>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.log("Ошибка загрузки истории"); }
        }

        async function startQuiz() {
            try {
                const res = await fetch('/api/questions');
                questions = await res.json();
                if(!questions || !questions.length) return alert("Вопросы не найдены!");

                document.getElementById('main-menu').classList.add('hidden');
                document.getElementById('quiz-ui').classList.remove('hidden');
                renderQuestion();
                startTimer();
            } catch(e) { alert("Не удалось загрузить вопросы. Проверьте сервер."); }
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (!isPaused) {
                    timeLeft--;
                    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                    timerDisplay.innerText = `${m}:${s.toString().padStart(2, '0')}`;
                    if (timeLeft <= 0) finishQuiz();
                }
            }, 1000);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-overlay').classList.toggle('hidden', !isPaused);
        }

        function renderQuestion() {
            const q = questions[currentIndex];
            const isConfirmed = confirmedQuestions.has(q.id);

            document.getElementById('question-meta').innerText = `Тема: ${q.theme.title}`;
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${questions.length}`;

            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';

            q.options.forEach((opt, idx) => {
                const isSelected = (userAnswers[q.id] || []).includes(idx);
                let borderStyle = isSelected ? 'border-blue-500 bg-blue-600/10' : 'border-slate-800 bg-slate-800/40';

                if (isConfirmed) {
                    const isCorrect = q.correct.includes(idx);
                    if (isCorrect) borderStyle = 'border-green-500 bg-green-500/20 text-green-400';
                    else if (isSelected) borderStyle = 'border-red-500 bg-red-500/20 text-red-400';
                }

                const div = document.createElement('div');
                div.className = `p-5 rounded-2xl border-2 transition-all flex items-start gap-4 ${!isConfirmed ? 'cursor-pointer hover:border-slate-600' : ''} ${borderStyle}`;

                const iconShape = (q.type === 'single_choice') ? 'rounded-full' : 'rounded-md';
                const iconState = isSelected ? 'border-blue-500 bg-blue-500 text-white' : 'border-slate-700 bg-transparent';

                div.innerHTML = `
                    <div class="option-icon ${iconShape} ${iconState}">
                        ${isSelected ? '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="4"><path d="M5 13l4 4L19 7"></path></svg>' : ''}
                    </div>
                    <span class="text-lg leading-tight pt-1">${opt}</span>
                `;

                if (!isConfirmed) div.onclick = () => selectOption(q.id, idx, q.type);
                optionsContainer.appendChild(div);
            });

            // Кнопки управления
            document.getElementById('confirm-btn').classList.toggle('hidden', isConfirmed);
            document.getElementById('next-btn').classList.toggle('hidden', !isConfirmed || currentIndex === questions.length - 1);
            document.getElementById('finish-btn').classList.toggle('hidden', !isConfirmed || currentIndex !== questions.length - 1);

            const fb = document.getElementById('feedback');
            fb.classList.toggle('hidden', !isConfirmed);
            document.getElementById('prev-btn').disabled = currentIndex === 0 || isConfirmed;
        }

        function selectOption(qId, idx, type) {
            if (!userAnswers[qId]) userAnswers[qId] = [];

            if (type === 'single_choice') {
                userAnswers[qId] = [idx];
            } else {
                const pos = userAnswers[qId].indexOf(idx);
                if (pos > -1) userAnswers[qId].splice(pos, 1);
                else userAnswers[qId].push(idx);
            }
            renderQuestion();
        }

        function confirmAnswer() {
            const q = questions[currentIndex];
            const userSel = userAnswers[q.id] || [];
            if (!userSel.length) return alert("Выберите хотя бы один вариант!");

            confirmedQuestions.add(q.id);
            const isCorrect = JSON.stringify([...userSel].sort()) === JSON.stringify([...q.correct].sort());
            if (isCorrect) score++;

            const fb = document.getElementById('feedback');
            fb.innerText = isCorrect ? "ВЕРНО!" : `ОШИБКА! Правильный ответ: ${q.correct.map(i => q.options[i]).join(', ')}`;
            fb.className = `mt-8 p-6 rounded-2xl font-black text-center ${isCorrect ? 'bg-green-500/10 text-green-500 border border-green-500/50' : 'bg-red-500/10 text-red-500 border border-red-500/50'}`;
            renderQuestion();
        }

        function nextQuestion() { currentIndex++; renderQuestion(); }
        function prevQuestion() { if(currentIndex > 0) { currentIndex--; renderQuestion(); } }

        function confirmEarlyExit() {
            if(confirm("Завершить тест сейчас?")) finishQuiz();
        }

        async function finishQuiz() {
            clearInterval(timerInterval);
            const percent = ((score / questions.length) * 100).toFixed(1);

            await fetch('/api/save_result', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ score, total: questions.length, percentage: percent })
            });

            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score-val').innerText = `${score} / ${questions.length}`;
            document.getElementById('final-percent').innerText = `${percent}%`;
        }

        loadHistory();
    </script>
</body>
</html>
