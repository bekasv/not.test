<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Админ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-8">
    <div class="max-w-5xl mx-auto space-y-10">
        <div class="flex justify-between items-center bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <h1 class="text-2xl font-black uppercase tracking-tighter">Панель управления</h1>
            <a href="/logout" class="text-red-400 font-bold">Выйти</a>
        </div>

        <form action="/admin" method="POST" class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <input type="text" name="username" placeholder="Логин" required class="bg-slate-800 p-3 rounded-xl outline-none">
            <input type="password" name="password" placeholder="Пароль" required class="bg-slate-800 p-3 rounded-xl outline-none">
            <input type="date" name="expiry_date" required class="bg-slate-800 p-3 rounded-xl outline-none text-slate-400">
            <button class="bg-blue-600 hover:bg-blue-500 font-bold rounded-xl transition">Добавить</button>
        </form>

        <div class="bg-slate-900 rounded-2xl border border-slate-800 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-800">
                    <tr><th class="p-4">Студент</th><th class="p-4">Роль</th><th class="p-4 text-right">Доступ до</th></tr>
                </thead>
                <tbody class="divide-y divide-slate-800">
                    {% for u in users %}
                    <tr><td class="p-4 font-bold">{{ u.username }}</td><td class="p-4">Student</td><td class="p-4 text-right text-orange-400 font-mono">{{ u.expiry_date }}</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
