<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система Тестирования</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .option-card:hover { border-color: #475569; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8 font-sans">

    <div id="app" class="max-w-4xl mx-auto">
        <div id="login-screen" class="min-h-[85vh] flex items-center justify-center">
            <div class="bg-slate-900 p-8 md:p-12 rounded-3xl border border-slate-800 shadow-2xl w-full max-w-md space-y-6">
                <div class="text-center">
                    <h1 class="text-4xl font-black text-blue-500 italic">ВХОД</h1>
                    <p class="text-slate-500 text-sm mt-2 uppercase tracking-widest font-bold">Infrastructure Dept.</p>
                </div>
                <div class="space-y-4">
                    <input type="text" id="login-username" placeholder="Логин" class="w-full p-4 bg-slate-800 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 text-white">
                    <input type="password" id="login-password" placeholder="Пароль" class="w-full p-4 bg-slate-800 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 text-white">
                </div>
                <button onclick="handleLogin()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-lg transition shadow-lg active:scale-95">ВОЙТИ</button>
            </div>
        </div>

        <div id="admin-panel" class="hidden space-y-8">
            <div class="flex justify-between items-center bg-slate-900 p-6 rounded-3xl border border-slate-800">
                <h1 class="text-2xl font-black uppercase">Управление пользователями</h1>
                <button onclick="logout()" class="text-red-400 font-bold hover:underline">Выйти</button>
            </div>
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="new-user" placeholder="Логин" class="bg-slate-800 p-3 rounded-xl outline-none text-white">
                <input type="password" id="new-pass" placeholder="Пароль" class="bg-slate-800 p-3 rounded-xl outline-none text-white">
                <input type="date" id="new-expiry" class="bg-slate-800 p-3 rounded-xl outline-none text-slate-400">
                <button onclick="addUser()" class="bg-blue-600 hover:bg-blue-500 font-bold rounded-xl p-3">ДОБАВИТЬ</button>
            </div>
            <div class="bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-slate-500 text-xs uppercase">
                        <tr><th class="p-4">Студент</th><th class="p-4 text-right">Доступ до</th></tr>
                    </thead>
                    <tbody id="users-table-body" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </div>

        <div id="main-menu" class="hidden space-y-6">
            <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] shadow-2xl flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <h1 class="text-3xl font-black" id="welcome-msg"></h1>
                    <p class="text-slate-500 mt-1 italic">Результаты сохраняются локально в вашем браузере</p>
                </div>
                <div class="flex gap-4 w-full md:w-auto">
                    <button onclick="startQuiz()" class="flex-1 bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-2xl font-black shadow-lg shadow-blue-900/20">НАЧАТЬ ТЕСТ</button>
                    <button onclick="logout()" class="bg-slate-800 hover:bg-slate-700 px-6 py-4 rounded-2xl font-bold">ВЫХОД</button>
                </div>
            </div>
            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6">
                <h2 class="text-xl font-bold mb-4">История ваших тестов</h2>
                <div id="history-list" class="space-y-3"></div>
            </div>
        </div>

        <div id="quiz-ui" class="hidden space-y-6">
            <div class="flex justify-between items-center bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-lg">
                <div class="flex items-center gap-6">
                    <div id="timer" class="text-3xl font-mono font-black text-orange-500">120:00</div>
                    <button onclick="togglePause()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl text-xs font-black uppercase">Пауза</button>
                </div>
                <div id="progress-text" class="text-slate-400 font-bold"></div>
                <button onclick="confirmEarlyExit()" class="text-red-500 text-sm font-bold uppercase underline">Завершить</button>
            </div>

            <div id="quiz-container" class="bg-slate-900 p-8 md:p-12 rounded-[2.5rem] border border-slate-800 shadow-2xl min-h-[500px] flex flex-col">
                <div id="question-meta" class="text-xs text-blue-500 font-black uppercase mb-4 tracking-widest"></div>
                <h2 id="question-text" class="text-2xl md:text-3xl font-bold mb-10 leading-snug text-white"></h2>
                
                <div id="options" class="space-y-4 flex-grow"></div>

                <div id="feedback" class="mt-8 p-6 rounded-2xl hidden font-bold text-center border"></div>

                <div class="flex justify-between items-center mt-12 pt-8 border-t border-slate-800/50">
                    <button id="prev-btn" onclick="prevQuestion()" class="px-8 py-3 bg-slate-800 rounded-xl font-bold disabled:opacity-20 transition">НАЗАД</button>
                    <div class="flex gap-4">
                        <button id="confirm-btn" onclick="handleConfirm()" class="px-10 py-3 bg-blue-600 rounded-xl font-black hover:bg-blue-500 transition shadow-lg">ОТВЕТИТЬ</button>
                        <button id="next-btn" onclick="nextQuestion()" class="px-10 py-3 bg-slate-700 rounded-xl hidden font-black">ДАЛЕЕ</button>
                        <button id="finish-btn" onclick="finishQuiz()" class="px-10 py-3 bg-green-600 rounded-xl hidden font-black shadow-lg shadow-green-900/20">ИТОГИ</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="result-screen" class="hidden text-center py-24 space-y-6">
            <h1 class="text-6xl font-black text-white" id="final-score-val"></h1>
            <div class="text-3xl font-bold text-blue-500" id="final-percent"></div>
            <button onclick="location.reload()" class="bg-slate-800 px-12 py-4 rounded-2xl font-bold mt-10">ВЕРНУТЬСЯ В МЕНЮ</button>
        </div>
    </div>

    <div id="pause-overlay" class="fixed inset-0 bg-slate-950/98 backdrop-blur-xl z-50 hidden flex flex-col items-center justify-center">
        <h2 class="text-5xl font-black mb-10">ТЕСТ НА ПАУЗЕ</h2>
        <button onclick="togglePause()" class="bg-blue-600 px-12 py-5 rounded-full font-black text-xl">ПРОДОЛЖИТЬ</button>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('quiz_users')) || [
            {username: 'admin', password: 'admin123', role: 'admin', expiry: '2099-12-31'}
        ];
        let allQuestions = [], quizQuestions = [], currentUser = null;
        let currentIndex = 0, score = 0, userAnswers = {}, confirmedQuestions = new Set();
        let isPaused = false, timeLeft = 120 * 60, timerInterval;

        // Загрузка JSON
        async function loadQuestions() {
            try {
                const res = await fetch('questions.json');
                if(!res.ok) throw new Error();
                allQuestions = await res.json();
                console.log("Вопросы загружены:", allQuestions.length);
            } catch (e) {
                console.error("Ошибка загрузки questions.json");
            }
        }

        function showScreen(id) {
            ['login-screen', 'admin-panel', 'main-menu', 'quiz-ui', 'result-screen'].forEach(s => 
                document.getElementById(s).classList.toggle('hidden', s !== id)
            );
        }

        function handleLogin() {
            const u = document.getElementById('login-username').value;
            const p = document.getElementById('login-password').value;
            const found = users.find(x => x.username === u && x.password === p);

            if (found) {
                if (new Date() > new Date(found.expiry)) return alert("Доступ истек!");
                currentUser = found;
                if (found.role === 'admin') { renderAdmin(); showScreen('admin-panel'); }
                else { 
                    document.getElementById('welcome-msg').innerText = `Салам, ${found.username}!`;
                    renderHistory();
                    showScreen('main-menu'); 
                }
            } else alert("Неверный логин или пароль!");
        }

        function renderAdmin() {
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = users.filter(u => u.role !== 'admin').map(u => `
                <tr class="border-b border-slate-800"><td class="p-4 font-bold text-white">${u.username}</td><td class="p-4 text-right text-orange-400 font-mono">${u.expiry}</td></tr>
            `).join('');
        }

        function addUser() {
            const u = document.getElementById('new-user').value, p = document.getElementById('new-pass').value, e = document.getElementById('new-expiry').value;
            if(!u || !p || !e) return alert("Заполните все поля");
            users.push({username: u, password: p, expiry: e, role: 'student'});
            localStorage.setItem('quiz_users', JSON.stringify(users));
            renderAdmin();
        }

        async function startQuiz() {
            if (!allQuestions.length) await loadQuestions();
            if (!allQuestions.length) return alert("База вопросов пуста или не найдена!");

            const themes = {};
            allQuestions.forEach(q => {
                if(!themes[q.theme.id]) themes[q.theme.id] = { p: q.theme.pick_count, qs: [] };
                themes[q.theme.id].qs.push(q);
            });
            
            quizQuestions = [];
            Object.values(themes).forEach(t => {
                const shuffled = t.qs.sort(() => 0.5 - Math.random());
                quizQuestions.push(...shuffled.slice(0, t.p));
            });
            quizQuestions.sort(() => 0.5 - Math.random());

            showScreen('quiz-ui');
            renderQuestion();
            startTimer();
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!isPaused) {
                    timeLeft--;
                    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                    document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                    if(timeLeft <= 0) finishQuiz();
                }
            }, 1000);
        }

        function togglePause() {
            isPaused = !isPaused;
            document.getElementById('pause-overlay').classList.toggle('hidden', !isPaused);
        }

        function renderQuestion() {
            const q = quizQuestions[currentIndex], isConfirmed = confirmedQuestions.has(q.id);
            document.getElementById('question-meta').innerText = `Тема: ${q.theme.title}`;
            document.getElementById('question-text').innerText = q.question;
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${quizQuestions.length}`;
            
            const cont = document.getElementById('options');
            cont.innerHTML = '';

            q.options.forEach((opt, idx) => {
                const isSelected = (userAnswers[q.id] || []).includes(idx);
                let borderStyle = isSelected ? 'border-blue-500 bg-blue-600/20' : 'border-slate-800 bg-slate-800/50';
                
                if (isConfirmed) {
                    if (q.correct.includes(idx)) borderStyle = 'border-green-500 bg-green-500/30 text-green-400';
                    else if (isSelected) borderStyle = 'border-red-500 bg-red-500/30 text-red-400';
                }

                const shape = q.type === 'single_choice' ? 'rounded-full' : 'rounded-lg';
                const iconBg = isSelected ? 'bg-blue-500 border-blue-500' : 'bg-transparent border-slate-600';

                const div = document.createElement('div');
                div.className = `p-6 rounded-3xl border-2 flex items-start gap-4 transition-all option-card ${!isConfirmed ? 'cursor-pointer' : ''} ${borderStyle}`;
                div.innerHTML = `
                    <div class="w-6 h-6 flex-shrink-0 border-2 mt-1 flex items-center justify-center ${shape} ${iconBg}">
                        ${isSelected ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>' : ''}
                    </div>
                    <div class="flex-1 text-xl font-medium text-white">${opt}</div>
                `;
                if(!isConfirmed) div.onclick = () => selectOption(q.id, idx, q.type);
                cont.appendChild(div);
            });

            document.getElementById('confirm-btn').classList.toggle('hidden', isConfirmed);
            document.getElementById('next-btn').classList.toggle('hidden', !isConfirmed || currentIndex === quizQuestions.length - 1);
            document.getElementById('finish-btn').classList.toggle('hidden', !isConfirmed || currentIndex !== quizQuestions.length - 1);
            document.getElementById('feedback').classList.toggle('hidden', !isConfirmed);
            document.getElementById('prev-btn').disabled = (currentIndex === 0 || isConfirmed);
        }

        function selectOption(qId, idx, type) {
            if(!userAnswers[qId]) userAnswers[qId] = [];
            if(type === 'single_choice') userAnswers[qId] = [idx];
            else {
                const pos = userAnswers[qId].indexOf(idx);
                pos > -1 ? userAnswers[qId].splice(pos, 1) : userAnswers[qId].push(idx);
            }
            renderQuestion();
        }

        function handleConfirm() {
            const q = quizQuestions[currentIndex], userSel = userAnswers[q.id] || [];
            if(!userSel.length) return alert("Выберите ответ!");
            
            confirmedQuestions.add(q.id);
            const isCorrect = JSON.stringify(userSel.sort()) === JSON.stringify(q.correct.sort());
            if(isCorrect) score++;
            
            const fb = document.getElementById('feedback');
            fb.innerText = isCorrect ? "ПРАВИЛЬНО!" : `НЕВЕРНО. ПРАВИЛЬНЫЙ: ${q.correct.map(i => q.options[i]).join(', ')}`;
            fb.className = `mt-8 p-6 rounded-3xl border-2 ${isCorrect ? 'bg-green-500/10 text-green-500 border-green-500/30' : 'bg-red-500/10 text-red-500 border-red-500/30'}`;
            renderQuestion();
        }

        function nextQuestion() { currentIndex++; renderQuestion(); }
        function prevQuestion() { if(currentIndex > 0) { currentIndex--; renderQuestion(); } }
        function confirmEarlyExit() { if(confirm("Завершить тест?")) finishQuiz(); }

        function finishQuiz() {
            clearInterval(timerInterval);
            const percent = ((score / quizQuestions.length) * 100).toFixed(1);
            const results = JSON.parse(localStorage.getItem('quiz_results') || '[]');
            results.push({user: currentUser.username, score, total: quizQuestions.length, percent, date: new Date().toISOString()});
            localStorage.setItem('quiz_results', JSON.stringify(results));

            showScreen('result-screen');
            document.getElementById('final-score-val').innerText = `${score} / ${quizQuestions.length}`;
            document.getElementById('final-percent').innerText = `${percent}%`;
        }

        function renderHistory() {
            const all = JSON.parse(localStorage.getItem('quiz_results') || '[]');
            const my = all.filter(r => r.user === currentUser.username).reverse();
            document.getElementById('history-list').innerHTML = my.map(r => `
                <div class="bg-slate-800/50 p-4 rounded-xl border border-slate-700 flex justify-between items-center">
                    <div>
                        <div class="text-2xl font-black text-blue-500">${r.percent}%</div>
                        <div class="text-[10px] text-slate-500 uppercase">${new Date(r.date).toLocaleDateString()}</div>
                    </div>
                    <div class="text-right text-slate-300 font-bold">${r.score} / ${r.total}</div>
                </div>
            `).join('') || '<p class="text-slate-600 text-center py-4">История пуста</p>';
        }

        function logout() { location.reload(); }

        loadQuestions();
    </script>
</body>
</html>
